<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6d6e4" />
    <title>Valentina, vuoi che smetta di volerti bene?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="floating-hearts" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="card" id="question-card">
        <p class="eyebrow">Un piccolo messaggio per te</p>
        <h1 id="question-text">Valentina, vuoi che smetta di volerti bene?</h1>
        <p id="attempt-message" class="attempt-message" aria-live="polite"></p>

        <div class="button-row">
          <button id="yes-btn" class="btn btn-yes">Sì</button>
          <button id="no-btn" class="btn btn-no">No ❤️</button>
        </div>
      </section>

      <section class="final-screen hidden" id="final-screen" aria-live="polite">
        <div class="final-content">
          <h2 id="final-title">Richiesta rifiutata ❤️</h2>
          <p id="final-subtitle">Mi dispiace, Valentina… ma non posso smettere di volerti bene.</p>
          <div id="final-steps" class="final-steps"></div>
          <div class="heart-stage">
            <div id="big-heart">❤️</div>
            <p id="signature-line">Daniele ❤️ Valentina</p>
          </div>
          <button id="continue-btn" class="btn btn-continue hidden">Va bene, allora continua ❤️</button>
          <p id="final-message" class="final-message hidden">Con molto piacere. Ogni giorno un po’ di più.</p>
          <p class="small-signature">Questo sito è stato creato apposta per te.</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
